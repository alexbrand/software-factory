apiVersion: apps/v1
kind: Deployment
metadata:
  name: apiserver
  labels:
    app.kubernetes.io/name: apiserver
    app.kubernetes.io/part-of: software-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apiserver
        app.kubernetes.io/part-of: software-factory
    spec:
      serviceAccountName: apiserver
      containers:
        - name: apiserver
          image: software-factory-apiserver:latest
          args:
            - --addr=:8080
            - --nats-url=nats://nats.$(NAMESPACE).svc:4222
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
