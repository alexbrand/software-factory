apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  labels:
    app.kubernetes.io/name: controller-manager
    app.kubernetes.io/part-of: software-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: controller-manager
        app.kubernetes.io/part-of: software-factory
    spec:
      serviceAccountName: controller-manager
      containers:
        - name: manager
          image: software-factory-controller-manager:latest
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NATS_URL
              value: "nats://nats.$(NAMESPACE).svc.cluster.local:4222"
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
