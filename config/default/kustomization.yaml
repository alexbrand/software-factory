apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: factory-system

resources:
  - ../crd
  - ../rbac
  - ../manager
  - ../apiserver
  - ../nats

images:
  - name: software-factory-controller-manager
    newName: software-factory-controller-manager
    newTag: latest
  - name: software-factory-apiserver
    newName: software-factory-apiserver
    newTag: latest
