---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: sessions.factory.example.com
spec:
  group: factory.example.com
  names:
    kind: Session
    listKind: SessionList
    plural: sessions
    singular: session
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Session represents an agent session in a sandbox.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SessionSpec defines the desired state of a Session.
            properties:
              agentType:
                description: AgentType identifies the type of agent for this session.
                type: string
              contextFiles:
                description: ContextFiles is a list of file paths to provide as context.
                items:
                  type: string
                type: array
              prompt:
                description: Prompt is the prompt to send to the agent.
                type: string
              sandboxRef:
                description: SandboxRef references the sandbox this session runs in.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              taskRef:
                description: TaskRef references the task this session is executing.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              timeout:
                description: |-
                  Timeout is the maximum duration for this session.
                  Inherited from the Task's spec.timeout. Default: 1h.
                type: string
            required:
            - agentType
            - prompt
            - sandboxRef
            type: object
          status:
            description: SessionStatus defines the observed state of a Session.
            properties:
              completedAt:
                description: CompletedAt is the time the session completed.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the session's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              eventStreamSubject:
                description: EventStreamSubject is the NATS subject for this session's
                  event stream.
                type: string
              failureReason:
                description: |-
                  FailureReason indicates why the session failed.
                  Set only when Phase is Failed.
                enum:
                - AgentError
                - Timeout
                - BridgeLost
                type: string
              pendingApproval:
                description: |-
                  PendingApproval contains summary info about a pending permission request.
                  Present only when Phase is WaitingForApproval.
                properties:
                  id:
                    description: ID is the unique identifier for this permission request.
                    type: string
                  requestedAt:
                    description: RequestedAt is when the permission was requested.
                    format: date-time
                    type: string
                  title:
                    description: Title is a human-readable summary of the request.
                    type: string
                  toolName:
                    description: ToolName is the tool the agent wants to execute.
                    type: string
                required:
                - id
                - requestedAt
                - title
                - toolName
                type: object
              phase:
                description: Phase is the current phase of the session.
                enum:
                - Pending
                - Active
                - WaitingForApproval
                - Completed
                - Failed
                - Cancelled
                type: string
              startedAt:
                description: StartedAt is the time the session started.
                format: date-time
                type: string
              tokenUsage:
                description: TokenUsage tracks token consumption for this session.
                properties:
                  cost:
                    description: Cost is the estimated cost as a string (e.g., "0.42").
                    type: string
                  input:
                    description: Input is the number of input tokens consumed.
                    format: int64
                    type: integer
                  output:
                    description: Output is the number of output tokens generated.
                    format: int64
                    type: integer
                required:
                - input
                - output
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
