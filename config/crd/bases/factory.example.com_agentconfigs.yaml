                items:
                  description: CredentialConfig defines a credential to inject into
                    the sandbox.
                  properties:
                    header:
                      description: Header is the HTTP header to use for this credential.
                      type: string
                    host:
                      description: Host is the hostname this credential applies to
                        (for proxy injection).
                      type: string
                    name:
                      description: Name is the environment variable name for the credential.
                      type: string
                    secretRef:
                      description: SecretRef references a Kubernetes Secret containing
                        the credential.
                      properties:
                        key:
                          description: Key is the key within the Secret.
                          type: string
                        name:
                          description: Name is the name of the Secret.
                          type: string
                      required:
                      - key
                      - name
                      type: object
                  required:
                  - name
                  - secretRef
                  type: object
                type: array
              displayName:
                description: DisplayName is a human-readable name for the agent type.
                type: string
              permissionMode:
                description: |-
                  PermissionMode controls how runtime permission requests are handled.
                  Defaults to "bypass".
                enum:
                - bypass
                - autoApprove
                - requireApproval
                type: string
              sdk:
