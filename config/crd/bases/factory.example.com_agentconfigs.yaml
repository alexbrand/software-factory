  names:
    kind: AgentConfig
    listKind: AgentConfigList
    plural: agentconfigs
    singular: agentconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentConfig defines how to run a specific agent type.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentConfigSpec defines the desired state of an AgentConfig.
            properties:
              agentSettings:
                description: AgentSettings contains agent-specific configuration.
                properties:
                  allowedTools:
                    description: AllowedTools is an optional list of tools the agent
                      is allowed to use.
                    items:
                      type: string
                    type: array
                  contextFile:
                    description: ContextFile is the context file the agent reads (e.g.,
                      CLAUDE.md).
                    type: string
                type: object
              agentType:
                description: AgentType is the agent identifier (must match SDK's agent
                  identifier).
                type: string
              bridge:
                description: Bridge configures the bridge sidecar container.
                properties:
                  healthCheck:
                    description: HealthCheck defines the health check configuration
                      for the bridge.
                    properties:
                      httpGet:
                        description: HTTPGet specifies the HTTP request to perform.
                        properties:
                          path:
                            description: Path is the path to access on the HTTP server.
                            type: string
                          port:
                            description: Port is the port to access on the container.
                            format: int32
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        description: InitialDelaySeconds is the number of seconds
                          after the container starts before health checks begin.
                        format: int32
                        type: integer
                      periodSeconds:
                        description: PeriodSeconds is how often (in seconds) to perform
                          the health check.
                        format: int32
                        type: integer
                    type: object
                  image:
                    description: Image is the container image for the bridge sidecar.
                    type: string
                  port:
                    description: Port is the port the bridge listens on.
                    format: int32
                    type: integer
                required:
                - image
                type: object
              credentials:
