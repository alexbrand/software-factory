---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: pools.factory.example.com
spec:
  group: factory.example.com
  names:
    kind: Pool
    listKind: PoolList
    plural: pools
    singular: pool
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Pool defines a template for pre-provisioned sandboxes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PoolSpec defines the desired state of a Pool.
            properties:
              agentConfigRef:
                description: AgentConfigRef references the AgentConfig to use for
                  sandboxes in this pool.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              replicas:
                description: Replicas configures scaling behavior for the pool.
                properties:
                  idleTimeout:
                    description: IdleTimeout is the duration after which idle sandboxes
                      are terminated.
                    type: string
                  max:
                    description: Max is the maximum number of sandboxes allowed in
                      the pool.
                    format: int32
                    minimum: 0
                    type: integer
                  min:
                    description: Min is the minimum number of sandboxes to keep in
                      the pool.
                    format: int32
                    minimum: 0
                    type: integer
                  scaleUpThreshold:
                    description: ScaleUpThreshold is the ratio of active/(active+ready)
                      that triggers scale-up.
                    type: string
                required:
                - max
                - min
                type: object
              sandboxTemplate:
                description: SandboxTemplate defines the template for sandboxes created
                  by this pool.
                properties:
                  mcpTools:
                    description: MCPTools configures MCP tool access via ToolHive.
                    properties:
                      vmcpRef:
                        description: VMCPRef references a VirtualMCPServer in the
                          same namespace.
                        properties:
                          name:
                            description: Name of the referent.
                            type: string
                        required:
                        - name
                        type: object
                    required:
                    - vmcpRef
                    type: object
                  networkPolicy:
                    description: NetworkPolicy defines network access rules for sandboxes.
                    properties:
                      egressRules:
