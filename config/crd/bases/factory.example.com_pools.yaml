                        items:
                          description: EgressRule defines an allowed egress destination.
                          properties:
                            ports:
                              description: Ports is a list of allowed ports.
                              items:
                                format: int32
                                type: integer
                              type: array
                            to:
                              description: To is a list of allowed destination hosts
                                or patterns.
                              items:
                                type: string
                              type: array
                          required:
                          - ports
                          - to
                          type: object
                        type: array
                    type: object
                  resources:
                    description: Resources defines the compute resources for sandbox
