---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.2
  name: workflows.factory.example.com
spec:
  group: factory.example.com
  names:
    kind: Workflow
    listKind: WorkflowList
    plural: workflows
    singular: workflow
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Workflow defines a DAG of tasks.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: WorkflowSpec defines the desired state of a Workflow.
            properties:
              context:
                description: Context defines shared context across all tasks.
                properties:
                  files:
                    description: Files defines additional files available to all tasks.
                    items:
                      description: FileReference defines a reference to additional
                        files.
                      properties:
                        configMapRef:
                          description: ConfigMapRef references a ConfigMap containing
                            file content.
                          properties:
                            name:
                              description: Name of the referent.
                              type: string
                          required:
                          - name
                          type: object
                        name:
                          description: Name is a logical name for the file reference.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  repository:
                    description: Repository defines a git repository to clone for
                      all tasks.
                    properties:
                      branch:
                        description: Branch is the branch to clone.
                        type: string
                      url:
                        description: URL is the git repository URL.
                        type: string
                    required:
                    - url
                    type: object
                type: object
              defaults:
                description: Defaults defines global configuration applied to all
                  tasks.
                properties:
                  poolRef:
                    description: PoolRef references the default pool for tasks.
                    properties:
                      name:
                        description: Name of the referent.
                        type: string
                    required:
                    - name
                    type: object
                  retries:
                    description: Retries is the default number of retries for tasks.
                    format: int32
                    type: integer
                  timeout:
                    description: Timeout is the default timeout for tasks.
                    type: string
                type: object
              tasks:
                description: Tasks defines the DAG of tasks to execute.
                items:
                  description: WorkflowTask defines a task within a workflow DAG.
                  properties:
                    dependsOn:
                      description: DependsOn is a list of task names that must complete
                        before this task starts.
                      items:
                        type: string
                      type: array
                    name:
                      description: Name is the unique name of the task within the
                        workflow.
                      type: string
                    spec:
                      description: Spec defines the task specification.
                      properties:
                        inputs:
                          description: Inputs defines artifacts to inject before the
                            task runs.
                          items:
                            description: ArtifactReference defines an input or output
                              artifact.
                            properties:
                              artifact:
                                description: Artifact is the logical name of the artifact.
                                type: string
                              path:
                                description: Path is the filesystem path for the artifact.
                                type: string
                            required:
                            - artifact
                            - path
                            type: object
                          type: array
                        outputs:
                          description: Outputs defines artifacts to extract after
                            the task completes.
                          items:
                            description: ArtifactReference defines an input or output
                              artifact.
                            properties:
                              artifact:
                                description: Artifact is the logical name of the artifact.
                                type: string
                              path:
                                description: Path is the filesystem path for the artifact.
                                type: string
                            required:
                            - artifact
                            - path
                            type: object
                          type: array
                        poolRef:
                          description: PoolRef overrides the workflow default pool
                            for this task.
                          properties:
                            name:
                              description: Name of the referent.
                              type: string
                          required:
                          - name
                          type: object
                        prompt:
                          description: Prompt is the prompt to send to the agent.
                          type: string
                        retries:
                          description: Retries overrides the workflow default retry
                            count for this task.
                          format: int32
                          type: integer
                        timeout:
                          description: Timeout overrides the workflow default timeout
                            for this task.
                          type: string
