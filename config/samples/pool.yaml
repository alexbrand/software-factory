apiVersion: factory.example.com/v1alpha1
kind: Pool
metadata:
  name: coding-pool
spec:
  agentConfigRef:
    name: claude-code

  replicas:
    min: 1
    max: 3
    idleTimeout: 10m
    scaleUpThreshold: "0.8"

  sandboxTemplate:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

    storage:
      size: 10Gi
      storageClassName: standard
      reclaimPolicy: Delete

    networkPolicy:
      egressRules:
        - to: ["api.anthropic.com"]
          ports: [443]
